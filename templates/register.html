<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="light"/>
<title>Register — Business Scraping Agent</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  :root{ color-scheme:light; --blue:#1A43BF; --blue-dark:#163AA3; --text:#1F2937; --text-2:#6B7280; --line:#E9EDF3; --bg:#F6F8FB; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 10px rgba(16,24,40,.06);
        width:100%;max-width:380px;padding:32px 30px;}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:22px;}
  .brand-mark{width:38px;height:38px;border-radius:9px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;}
  .brand-name{font-size:15px;font-weight:700;line-height:1.2;}
  .brand-sub{font-size:11px;color:var(--text-2);}
  h1{font-size:18px;font-weight:700;margin-bottom:4px;}
  .sub{font-size:13px;color:var(--text-2);margin-bottom:20px;}
  label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;}
  .inp{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);margin-bottom:15px;}
  .inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,67,191,.12);}
  .btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn:hover{background:var(--blue-dark);}
  .pw-wrap{position:relative;}
  .pw-wrap .inp{padding-right:42px;}
  .pw-eye{position:absolute;top:10px;right:8px;background:none;border:none;color:var(--text-2);cursor:pointer;font-size:14px;padding:6px;line-height:1;}
  .pw-eye:hover{color:var(--blue);}
  .err{background:#FBE9E9;color:#C62828;border:1px solid #f3c9c9;border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:16px;}
  .foot{font-size:11px;color:var(--text-2);text-align:center;margin-top:18px;}
  .back{display:block;text-align:center;font-size:12.5px;color:var(--blue);text-decoration:none;margin-top:16px;}
</style>
</head>
<body>
  <form class="card" method="POST" action="/register">
    <div class="brand">
      <div class="brand-mark"><i class="fa-solid fa-building-columns"></i></div>
      <div>
        <div class="brand-name">Business Scraping Agent</div>
        <div class="brand-sub">Business Investigation System</div>
      </div>
    </div>

    <h1>Create an account</h1>
    <div class="sub">Register with a username, email, and password.</div>

    {% if error %}<div class="err"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>{% endif %}

    <label for="username">Username</label>
    <input class="inp" id="username" name="username" value="{{ username or '' }}" autocomplete="username" autofocus required/>

    <label for="email">Email address</label>
    <input class="inp" id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required/>

    <label for="password">Password</label>
    <div class="pw-wrap">
      <input class="inp" id="password" name="password" type="password" autocomplete="new-password" required/>
      <button type="button" class="pw-eye" data-target="password" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
    </div>

    <label for="password2">Confirm password</label>
    <div class="pw-wrap">
      <input class="inp" id="password2" name="password2" type="password" autocomplete="new-password" required/>
      <button type="button" class="pw-eye" data-target="password2" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
    </div>

    <button class="btn" type="submit"><i class="fa-solid fa-user-plus"></i> Register &amp; sign in</button>

    <a class="back" href="/login"><i class="fa-solid fa-arrow-left"></i> Back to sign in</a>
    <div class="foot">Uganda Revenue Authority · Internal use only</div>
  </form>
<script>
  document.querySelectorAll('.pw-eye').forEach(function(btn){
    btn.addEventListener('click', function(){
      var inp  = document.getElementById(btn.getAttribute('data-target'));
      var icon = btn.querySelector('i');
      var show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      icon.classList.toggle('fa-eye', !show);
      icon.classList.toggle('fa-eye-slash', show);
    });
  });
</script>
</body>
</html>
