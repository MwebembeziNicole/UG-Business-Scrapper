app = "ug-business-scrapper"
primary_region = "jnb"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  # Persistent volume (see [[mounts]] below) — survives deploys/restarts.
  SQLITE_DB_PATH      = "/data/uganda_businesses.db"
  EXPORT_DIR          = "/data/exports"
  DAILY_EXPORT_DIR    = "/data/exports/daily"
  BROWSER_PROFILE_DIR = "/data/browser_profiles"

[[mounts]]
  source      = "ug_scraper_data"
  destination = "/data"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = false   # keep running so APScheduler's daily job still fires
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size   = "shared-cpu-1x"
  memory = "2gb"   # Chrome needs headroom; 256MB/512MB will OOM
